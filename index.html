<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CowCalc MVP</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="wrap">
<h1>🐂 CowCalc</h1>
<p>Simple MVP based on the spreadsheet logic.</p>

<div class="card">
<label>Live Weight (kg)</label>
<input id="weight" type="number" value="450">

<label>Days Feeding</label>
<input id="days" type="number" value="90">

<label>Daily Gain (kg)</label>
<input id="gain" type="number" step="0.1" value="1.5">

<label>Kill Out %</label>
<input id="kill" type="number" value="50">

<label>Feed Cost / Day (€)</label>
<input id="feed" type="number" step="0.01" value="4.50">

<label>Other Costs (€)</label>
<input id="other" type="number" step="0.01" value="100">

<label>Factory Price €/kg</label>
<input id="factory" type="number" step="0.01" value="7.20">

<label>Target Profit (€)</label>
<input id="profit" type="number" value="100">

<button onclick="calc()">Calculate</button>
</div>

<div class="results">
<h2>Results</h2>
<p><b>Expected Carcass Weight:</b> <span id="cw"></span> kg</p>
<p><b>Factory Value:</b> €<span id="fv"></span></p>
<p><b>Total Finishing Cost:</b> €<span id="fc"></span></p>
<p><b>Maximum Purchase Price:</b> €<span id="pp"></span></p>
<p><b>Maximum Bid €/kg:</b> €<span id="kg"></span></p>
</div>
</div>
<script src="js/app.js"></script>
</body>
</html>
